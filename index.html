<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #fde8f2 0%, #fce0ec 50%, #f9d5e8 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    font-family: 'Lato', sans-serif;
    position: relative;
    overflow: hidden;

  .hearts-bg {
    position: fixed;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 0;
  }

  .heart {
    position: absolute;
    animation: floatUp linear infinite;
    opacity: 0;
    user-select: none;
  }

  @keyframes floatUp {
    0%   { transform: translateY(0) scale(0.7) rotate(-10deg); opacity: 0; }
    10%  { opacity: 0.7; }
    80%  { opacity: 0.5; }
    100% { transform: translateY(-110vh) scale(1.1) rotate(15deg); opacity: 0; }
  }

  .card {
    background: linear-gradient(160deg, #fff5f8 0%, #fce8f0 60%, #f9e0ee 100%);
    border: 1.5px solid #f4b8d4;
    border-radius: 24px;
    padding: 2.5rem 2.5rem 2rem;
    max-width: 480px;
    width: 100%;
    text-align: center;
    position: relative;
    z-index: 1;
    box-shadow: 0 8px 40px rgba(220,100,150,0.15);
  }

  .crown { font-size: 2rem; margin-bottom: 0.3rem; display: block; }

  .cordially {
    font-weight: 300;
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #c0698f;
    margin: 0 0 0.4rem;
  }

  .you-have {
    font-family: 'Playfair Display', serif;
    font-size: 13px;
    font-style: italic;
    color: #b05880;
    margin: 0 0 0.3rem;
  }

  .main-title {
    font-family: 'Playfair Display', serif;
    font-size: 2.3rem;
    font-weight: 700;
    color: #8b2252;
    margin: 0 0 0.15rem;
    line-height: 1.1;
  }

  .subtitle {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    font-style: italic;
    color: #c0698f;
    margin: 0 0 1rem;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 0 0 1rem;
    color: #e8a0c0;
    font-size: 1rem;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, #e8a0c0, transparent);
  }

  .puppy-container {
    margin: 0.2rem auto 1rem;
    width: 150px;
    height: 150px;
    background: rgba(255,255,255,0.5);
    border-radius: 50%;
    border: 2px dashed #f4b8d4;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .wisdom-label {
    font-weight: 300;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #c0698f;
    margin: 0 0 0.4rem;
  }

  .wisdom {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    font-style: italic;
    color: #7a3055;
    line-height: 1.6;
    margin: 0 0 0.3rem;
  }

  .wisdom-attr {
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 0.1em;
    color: #c0698f;
    margin: 0 0 1.2rem;
  }

  .details-row {
    display: flex;
    justify-content: center;
    gap: 1rem;
    flex-wrap: wrap;
    margin-bottom: 1.4rem;
  }

  .detail-pill {
    background: rgba(255,255,255,0.6);
    border: 1px solid #f4b8d4;
    border-radius: 999px;
    padding: 5px 14px;
    font-size: 11px;
    color: #8b2252;
    letter-spacing: 0.06em;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .rsvp-btn {
    background: linear-gradient(135deg, #e0618e 0%, #c04575 100%);
    color: #fff;
    border: none;
    border-radius: 999px;
    padding: 12px 38px;
    font-family: 'Lato', sans-serif;
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 2px 14px rgba(192,69,117,0.25);
  }

  .rsvp-btn:hover {
    transform: scale(1.04);
    box-shadow: 0 4px 20px rgba(192,69,117,0.35);
  }

  .footer-hearts {
    margin-top: 1.2rem;
    font-size: 1rem;
    color: #e8a0c0;
    letter-spacing: 0.3em;
  }

  </div>

    Count me in ♥

<script>
  const container = document.getElementById('heartsContainer');
  const heartChars = ['♥','♡','💕','💗','🌸'];
  const colors = ['#e8a0c0','#f4b8d4','#d4638e','#c0698f','#f9c0d8','#b05880'];

  function makeHeart() {
    const el = document.createElement('span');
    el.className = 'heart';
    el.textContent = heartChars[Math.floor(Math.random() * heartChars.length)];
    el.style.left = Math.random() * 100 + '%';
    el.style.bottom = '-40px';
    el.style.color = colors[Math.floor(Math.random() * colors.length)];
    const dur = 4 + Math.random() * 5;
    el.style.animationDuration = dur + 's';
    el.style.animationDelay = (Math.random() * 2) + 's';
    el.style.fontSize = (0.9 + Math.random() * 1.2) + 'rem';
    container.appendChild(el);
    setTimeout(() => el.remove(), (dur + 3) * 1000);
  }

  for (let i = 0; i < 18; i++) setTimeout(makeHeart, i * 280);
  setInterval(makeHeart, 400);
</script>
